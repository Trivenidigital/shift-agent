/opt/shift-agent/logs/cockpit-audit.log {
    weekly
    rotate 26
    compress
    delaycompress
    nocreate
    missingok
    sharedscripts
    prerotate
        /usr/bin/chattr -a /opt/shift-agent/logs/cockpit-audit.log || true
    endscript
    postrotate
        /usr/bin/chattr +a /opt/shift-agent/logs/cockpit-audit.log || true
    endscript
}

/opt/shift-agent/logs/cockpit.log {
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
}
