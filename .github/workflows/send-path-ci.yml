name: send-path-ci

# Isolated Linux pytest gate for the send-path surface (send-path-test-harness
# 2026-05-30). No live WhatsApp bridge exists on the runner, and the harness
# itself (conftest fake-sink default + safe_io LiveBridgeSendInTestError
# tripwire) guarantees no test can reach the live bridge. NO production secrets
# are used or required.

on:
  pull_request:
    paths:
      - "src/platform/**"
      - "src/agents/**"
      - "tools/**"
      - "tests/**"
      - ".github/workflows/send-path-ci.yml"
  push:
    branches:
      - main
    paths:
      - "src/platform/**"
      - "src/agents/**"
      - "tools/**"
      - "tests/**"
      - ".github/workflows/send-path-ci.yml"

concurrency:
  group: send-path-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  send-path:
    name: send-path pytest (fake sink, no live bridge)
    runs-on: ubuntu-latest
    env:
      # Gate #3: CI defaults the bridge to a CLOSED loopback sink, never the
      # live bridge (:3000). The conftest autouse fixture also enforces this
      # per-test; setting it here makes the workflow-level default explicit.
      HERMES_BRIDGE_URL: "http://127.0.0.1:1/__fake_test_sink__"
      # Belt-and-suspenders: never opt into live bridge sends at the job level.
      # Tests that exercise the send path opt in per-test against a local stub.
      SHIFT_AGENT_ALLOW_BRIDGE_IN_TESTS: ""
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test deps (no project secrets)
        run: |
          python -m pip install --upgrade pip
          python -m pip install pydantic pyyaml pytest

      - name: Pytest - non-Flyer root suite
        run: |
          mapfile -t TESTS < <(find tests -maxdepth 1 -type f -name 'test_*.py' ! -name 'test_flyer*' | sort)
          python -m pytest -q -p no:cacheprovider "${TESTS[@]}"

      # PR-R1: surface per-test collection/execution/PASSED lines for EVERY test
      # (incl. the 4 Linux-only ones that are skipped on the Windows dev box), the
      # module-provenance/binding diagnostic block, and the cross-store contention
      # winner/loser evidence — so the reviewer can read provenance + exactly-one-
      # durable-winner proof directly from the CI log. -s keeps prints unbuffered.
      - name: PR-R1 provenance + contention diagnostics (reviewer-mandated)
        run: python -m pytest tests/test_routing_invariants_r1.py -v -s

      - name: R2B-1 conflict-routing diagnostics (reviewer-mandated)
        # Individually named results for the R2B-1 evidence package: the full
        # 42-cell conflict-routing suite plus the two Linux-only dispatch cells
        # (exact production-canary replay; flag-off byte-identical behavior).
        run: |
          echo "branch HEAD=$(git rev-parse HEAD) merge-ref GITHUB_SHA=${GITHUB_SHA}"
          python -m pytest -vv tests/test_amendment_conflict_routing.py \
            "tests/test_cf_router_plugin.py::TestF7PrimaryMode::test_r2b1_conflict_canary_captures_amendment_flyer_arm_not_invoked" \
            "tests/test_cf_router_plugin.py::TestF7PrimaryMode::test_r2b1_flag_off_canary_is_byte_identical_flyer_revision"

      # ops/approval-lock-init: direct-execution evidence for the deploy-lock init
      # tests. Echo the checkout ref, then run every test individually (incl. the
      # extract-and-run, real-script-guard, and adversarial fd-interposition cases
      # that are Linux-only) so the reviewer can read PASSED lines + the fd-identity
      # evidence directly from the CI log. On Linux ALL are collected + PASS (none
      # skipped).
      - name: ops/approval-lock-init deploy-lock diagnostics (reviewer-mandated)
        run: |
          echo "branch HEAD=$(git rev-parse HEAD) merge-ref GITHUB_SHA=${GITHUB_SHA}"
          python -m pytest -vv tests/test_deploy_lock_init.py

      # ops/retired-template-removal: the dir_fd-anchored deletion evidence. On Linux
      # ALL cells COLLECT + PASS with ZERO skips (the extract-and-run cells are
      # skipif-win32; win32 is false here). The reviewer reads the parent-anchor
      # evidence line + the swapped-symlink target-survives + symlinked-parent-FATAL
      # PASSED lines directly from the CI log.
      - name: Retired-template removal diagnostics (reviewer-mandated)
        run: |
          echo "branch HEAD=$(git rev-parse HEAD) merge-ref GITHUB_SHA=${GITHUB_SHA}"
          python -m pytest -vv tests/test_deploy_retired_template.py

      # TTL-0 observe-only sweep (PR #633): the read-only-by-construction evidence.
      # Echo the checkout ref, then run the full suite — incident partition, the A1-A6
      # semantic pins, and the fail-closed AST no-write guard (module + CLI) — so the
      # reviewer reads the observe-only proof + PASSED lines directly from the CI log.
      - name: TTL-0 observe diagnostics (reviewer-mandated)
        run: |
          echo "branch HEAD=$(git rev-parse HEAD) merge-ref GITHUB_SHA=${GITHUB_SHA}"
          python -m pytest -vv tests/test_flyer_ttl0_observe.py
